<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background with gradient -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#57ab5a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#brandGradient)" />

  <!-- 3x3 pixel grid (representing a tiny heatmap) -->
  <!-- Row 1 -->
  <rect x="120" y="120" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <rect x="216" y="120" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <rect x="312" y="120" width="80" height="80" rx="12" fill="white" opacity="0.3" />

  <!-- Row 2 -->
  <rect x="120" y="216" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <rect x="216" y="216" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <rect x="312" y="216" width="80" height="80" rx="12" fill="white" opacity="0.3" />

  <!-- Row 3 -->
  <rect x="120" y="312" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <rect x="216" y="312" width="80" height="80" rx="12" fill="white" opacity="0.3" />
  <!-- Bottom-right pixel: full opacity (the "completed" pixel) -->
  <rect x="312" y="312" width="80" height="80" rx="12" fill="white" opacity="1" />
</svg>
